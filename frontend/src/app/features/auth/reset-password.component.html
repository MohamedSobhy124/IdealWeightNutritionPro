<section class="auth-shell">
  <div class="auth-layout">
    <aside class="auth-brand-panel" aria-hidden="true">
      <div class="auth-brand-panel__logo">
        <span class="material-icons text-[32px]">password</span>
      </div>
      <h2 class="auth-brand-panel__title">{{ t('resetPasswordTitle') }}</h2>
      <p class="auth-brand-panel__lead">{{ t('securePayments') }}</p>
    </aside>

    <div class="auth-form-wrap">
      <ui-page-header [title]="t('resetPasswordTitle')" [breadcrumbs]="[{ label: t('navHome'), link: '/' }]" />

      <div class="auth-form-card">
        @if (!token || !email) {
          <ui-empty-state icon="link_off" [title]="t('resetLinkInvalid')" [danger]="true">
            <a routerLink="/auth/login" class="ui-btn-secondary">{{ t('login') }}</a>
          </ui-empty-state>
        } @else {
          <div class="auth-form-icon lg:hidden">
            <span class="material-icons text-[28px]">password</span>
          </div>

          <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
            <ui-form-field [label]="t('newPassword')">
              <input type="password" formControlName="password" name="password" autocomplete="new-password" class="ui-input" />
            </ui-form-field>

            @if (error()) {
              <p class="ui-error" role="alert" aria-live="polite">{{ error() }}</p>
            }
            @if (message()) {
              <p class="flex items-center gap-1.5 text-sm font-medium text-success-fg" role="status" aria-live="polite">
                <span class="material-icons text-[18px]" aria-hidden="true">check_circle</span>
                {{ message() }}
              </p>
            }

            <button type="submit" class="ui-btn-primary w-full" [disabled]="form.invalid || loading()" [attr.aria-busy]="loading()">
              @if (loading()) {
                <span class="material-icons animate-spin text-[18px]" aria-hidden="true">progress_activity</span>
              }
              {{ t('updatePassword') }}
            </button>
          </form>

          <p class="mt-6 text-center text-sm">
            <a routerLink="/auth/login" class="font-medium text-brand-600 hover:text-brand-700">{{ t('login') }}</a>
          </p>
        }
      </div>
    </div>
  </div>
</section>
