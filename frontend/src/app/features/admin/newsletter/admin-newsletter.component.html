<ui-page-header [title]="t('newsletterTitle')">

  <div header-actions>

    <button type="button" class="ui-btn-secondary ui-btn-sm" (click)="exportCsv()" [disabled]="exporting()">

      <span class="material-icons !text-[18px]">download</span>

      {{ exporting() ? t('exporting') : t('exportSubscribers') }}

    </button>

  </div>

</ui-page-header>



@if (message()) {

  <p class="mb-4 text-sm text-success-fg">{{ message() }}</p>

}



@if (error()) {

  <p class="mb-4 text-danger">{{ error() }}</p>

}



<ui-data-table

  [columns]="cols"

  [rows]="$any(items())"

  [loading]="loading()"

  [searchable]="false"

  [pageSize]="20"

  [emptyTitle]="t('noSubscribers')"

  [ofLabel]="t('of')"
  [previousPageLabel]="t('prevPage')"
  [nextPageLabel]="t('nextPage')"
  >

  <div table-toolbar>

    <ui-filter-bar>

      <label class="flex flex-col gap-1">

        <span class="ui-label">{{ t('productStatus') }}</span>

        <select class="ui-select" [(ngModel)]="status" name="status" (change)="load()">

          <option value="all">{{ t('filterAll') }}</option>

          <option value="active">{{ t('filterActive') }}</option>

          <option value="inactive">{{ t('filterInactive') }}</option>

        </select>

      </label>

    </ui-filter-bar>

  </div>



  <ng-template uiCell="email" let-row>

    {{ $any(row).email }}

  </ng-template>



  <ng-template uiCell="subscribedDate" let-row>

    {{ $any(row).subscribedDate | date: 'medium' }}

  </ng-template>



  <ng-template uiCell="source" let-row>

    {{ $any(row).source ?? '—' }}

  </ng-template>



  <ng-template uiCell="status" let-row>

    @let item = $any(row);

    <ui-badge [variant]="item.isActive ? 'success' : 'neutral'" [dot]="item.isActive">

      {{ item.isActive ? t('active') : t('inactive') }}

    </ui-badge>

  </ng-template>



  <ng-template uiCell="actions" let-row>

    @let item = $any(row);

    <div class="flex flex-wrap gap-1.5">

      <button type="button" class="ui-btn-secondary ui-btn-sm" (click)="toggle(item)" [disabled]="busyId() === item.id">

        {{ item.isActive ? t('deactivate') : t('activate') }}

      </button>

      <button type="button" class="ui-btn-danger ui-btn-sm" (click)="remove(item)" [disabled]="busyId() === item.id">

        {{ t('remove') }}

      </button>

    </div>

  </ng-template>

</ui-data-table>
