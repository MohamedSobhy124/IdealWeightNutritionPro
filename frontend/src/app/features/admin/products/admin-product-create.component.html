<ui-page-header
  [title]="t('newProductTitle')"
  [subtitle]="t('newProductHint')"
  [breadcrumbs]="[{ label: t('productsTitle'), link: '/admin/products' }]"
></ui-page-header>

@if (loading()) {
  <div class="ui-card ui-card-pad space-y-3">
    <ui-skeleton height="2rem" width="40%" />
    <ui-skeleton height="2.5rem" />
    <ui-skeleton height="2.5rem" />
  </div>
} @else if (error()) {
  <ui-empty-state icon="error_outline" [title]="error()!" [danger]="true" />
} @else {
  <form class="space-y-6" (ngSubmit)="submit()">
    <ui-card>
      <h3 class="mb-4 text-base font-semibold text-ink-900">{{ t('sectionBasicInfo') }}</h3>
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <ui-form-field [label]="t('titleEn')" [required]="true">
          <input class="ui-input" [(ngModel)]="title" name="title" required />
        </ui-form-field>
        <ui-form-field [label]="t('titleAr')">
          <input class="ui-input" [(ngModel)]="titleAr" name="titleAr" />
        </ui-form-field>
        <ui-form-field [label]="t('description')" class="sm:col-span-2">
          <textarea class="ui-textarea" [(ngModel)]="description" name="description" rows="3"></textarea>
        </ui-form-field>
        <ui-form-field [label]="t('slugOptional')">
          <input class="ui-input" [(ngModel)]="slug" name="slug" [placeholder]="t('slugPlaceholder')" />
        </ui-form-field>
        <ui-form-field [label]="t('category')" [required]="true">
          <select class="ui-select" [(ngModel)]="categoryId" name="categoryId" required>
            @for (category of categories(); track category.id) {
              <option [ngValue]="category.id">{{ category.name }}</option>
            }
          </select>
        </ui-form-field>
        <ui-form-field [label]="t('brandOptional')">
          <select class="ui-select" [(ngModel)]="brandId" name="brandId">
            <option [ngValue]="null">{{ t('none') }}</option>
            @for (brand of brands(); track brand.id) {
              <option [ngValue]="brand.id">{{ brand.name }}</option>
            }
          </select>
        </ui-form-field>
      </div>
    </ui-card>

    <ui-card>
      <h3 class="mb-4 text-base font-semibold text-ink-900">{{ t('sectionPricing') }}</h3>
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <ui-form-field [label]="t('salePrice')" [required]="true">
          <input class="ui-input" type="number" min="0" step="0.01" [(ngModel)]="price" name="price" required />
        </ui-form-field>
        <ui-form-field [label]="t('listPrice')">
          <input class="ui-input" type="number" min="0" step="0.01" [(ngModel)]="listPrice" name="listPrice" />
        </ui-form-field>
        <ui-form-field [label]="t('storeCost')">
          <input class="ui-input" type="number" min="0" step="0.01" [(ngModel)]="storeCost" name="storeCost" />
        </ui-form-field>
        <ui-form-field [label]="t('stockQuantity')" [required]="true">
          <input class="ui-input" type="number" min="0" step="1" [(ngModel)]="stockQuantity" name="stockQuantity" required />
        </ui-form-field>
        <ui-form-field [label]="t('minStockAlert')">
          <input class="ui-input" type="number" min="0" step="1" [(ngModel)]="minimumStockAlert" name="minimumStockAlert" />
        </ui-form-field>
        <ui-form-field [label]="t('expiryDate')">
          <input class="ui-input" type="date" [(ngModel)]="expiryDate" name="expiryDate" />
        </ui-form-field>
      </div>
      <div class="mt-4 grid grid-cols-1 gap-3 sm:grid-cols-2">
        <label class="flex items-center gap-2 text-sm text-ink-700">
          <input type="checkbox" [(ngModel)]="isNew" name="isNew" />
          {{ t('isNewProduct') }}
        </label>
        <label class="flex items-center gap-2 text-sm text-ink-700">
          <input type="checkbox" [(ngModel)]="isTrending" name="isTrending" />
          {{ t('isTrendingProduct') }}
        </label>
        <label class="flex items-center gap-2 text-sm text-ink-700">
          <input type="checkbox" [(ngModel)]="allowFreeDelivery" name="allowFreeDelivery" />
          {{ t('allowFreeDelivery') }}
        </label>
        @if (allowFreeDelivery) {
          <ui-form-field [label]="t('freeDeliveryMinimum')">
            <input
              class="ui-input"
              type="number"
              min="0"
              step="0.01"
              [(ngModel)]="freeDeliveryMinimumAmount"
              name="freeDeliveryMinimumAmount"
            />
          </ui-form-field>
        }
      </div>
    </ui-card>

    @if (saveError()) {
      <div class="rounded-xl bg-danger-soft px-4 py-3 text-sm text-danger">{{ saveError() }}</div>
    }

    <div class="flex justify-end gap-2">
      <a routerLink="/admin/products" class="ui-btn-secondary">{{ t('cancel') }}</a>
      <button type="submit" class="ui-btn-primary" [disabled]="submitting()">
        {{ submitting() ? t('creating') : t('createProduct') }}
      </button>
    </div>
  </form>
}
