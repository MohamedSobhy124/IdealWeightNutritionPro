@if (sale(); as s) {
  <aside class="border-b border-brand-500/30 bg-gradient-to-r from-brand-700 to-brand-600 text-white" role="region" [attr.aria-label]="t('flashSales')">
    <div class="container flex min-h-9 items-center gap-2 py-1.5 text-xs sm:gap-3 sm:text-sm">
      <span class="material-icons shrink-0 !text-[18px]">bolt</span>
      <span class="truncate font-semibold">{{ saleName(s) }}</span>
      <span class="hidden shrink-0 text-white/80 sm:inline">{{ t('saleEndsIn') }}</span>
      <app-flash-sale-countdown class="shrink-0" [endDate]="s.endDate" />
      <a [routerLink]="['/flash-sales', s.id]" class="ms-auto shrink-0 font-semibold underline-offset-2 hover:underline">{{ t('shopSale') }}</a>
    </div>
  </aside>
} @else {
  <aside class="promo-ticker" role="region" [attr.aria-label]="t('navOffers')">
    <div class="container promo-ticker__viewport">
      <div class="promo-ticker__track">
        @for (group of [0, 1]; track group) {
          <div class="promo-ticker__group" [attr.aria-hidden]="group === 1 ? true : null">
            <span>{{ t('promoBarLimitedOffer') }}</span>
            <span class="promo-ticker__sep" aria-hidden="true">|</span>
            <span>{{ t('promoBarCombos') }}</span>
            <span class="promo-ticker__sep" aria-hidden="true">|</span>
            <span>{{ t('promoBarOriginals') }}</span>
            <span class="promo-ticker__sep" aria-hidden="true">|</span>
            <span class="hidden sm:inline">{{ t('promoBarDelivery') }}</span>
            <span class="hidden promo-ticker__sep sm:inline" aria-hidden="true">|</span>
            <a routerLink="/offers" class="promo-ticker__link">{{ t('promoBarOffers') }}</a>
          </div>
        }
      </div>
    </div>
  </aside>
}
