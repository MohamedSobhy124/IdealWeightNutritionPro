services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Password123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=db_ac153b_idealweightdb;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True"
      Redis__ConnectionString: "redis:6379"
      Jwt__SigningKey: "DevOnlySigningKey_ChangeBeforeProduction_32CharsMin!"
      Cors__AllowedOrigins__0: "http://localhost:4000"
    depends_on:
      - sqlserver
      - redis

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      BACKEND_URL: "http://api:8080"
    depends_on:
      - api

volumes:
  sqlserver-data:
  redis-data:
